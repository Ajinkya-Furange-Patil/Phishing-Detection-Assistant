<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Phishing Detection Backend</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1f2937;
            margin-top: 0;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 10px 10px 10px 0;
        }
        button:hover {
            background: #2563eb;
        }
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .success {
            background: #d1fae5;
            border: 1px solid #10b981;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            border: 1px solid #ef4444;
            color: #991b1b;
        }
        .info {
            background: #dbeafe;
            border: 1px solid #3b82f6;
            color: #1e3a8a;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            margin-top: 10px;
        }
        label {
            font-weight: 600;
            color: #374151;
            display: block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Phishing Detection Backend Test</h1>
        <p>Test your backend API to ensure it's working correctly.</p>

        <h2>1. Health Check</h2>
        <button onclick="testHealth()">Test /health</button>
        <div id="health-result"></div>

        <h2>2. Simple Prediction</h2>
        <label>Email Text:</label>
        <textarea id="email-text">URGENT: Your account has been suspended. Click here to restore access immediately!</textarea>
        <br>
        <button onclick="testPredict()">Test /predict</button>
        <div id="predict-result"></div>

        <h2>3. Extract and Analyze (Full HTML)</h2>
        <label>Page HTML (simulated):</label>
        <textarea id="page-html"><html><body><div>Subject: Account Verification Required</div><div>From: security@paypa1.com</div><div>Body: Your account will be suspended unless you verify your information immediately. Click here: http://fake-site.com/verify</div></body></html></textarea>
        <br>
        <button onclick="testExtractAndAnalyze()">Test /extract-and-analyze</button>
        <div id="extract-result"></div>

        <h2>Test Results</h2>
        <div id="overall-result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';

        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.className = `result ${type}`;
            element.textContent = message;
        }

        async function testHealth() {
            showResult('health-result', '⏳ Testing...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (response.ok && data.status === 'healthy') {
                    showResult('health-result', 
                        `✅ SUCCESS!\n\n${JSON.stringify(data, null, 2)}`, 
                        'success');
                } else {
                    showResult('health-result', 
                        `⚠️ Unexpected response:\n\n${JSON.stringify(data, null, 2)}`, 
                        'error');
                }
            } catch (error) {
                showResult('health-result', 
                    `❌ ERROR: ${error.message}\n\nBackend may not be running. Start it with:\n  cd backend\n  python app.py`, 
                    'error');
            }
        }

        async function testPredict() {
            showResult('predict-result', '⏳ Testing...', 'info');
            
            const text = document.getElementById('email-text').value;
            
            try {
                const response = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, model: 'random_forest' })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    const pred = data.prediction;
                    showResult('predict-result', 
                        `✅ SUCCESS!\n\nPhishing: ${pred.is_phishing}\nConfidence: ${(pred.confidence * 100).toFixed(1)}%\nProbability: ${(pred.phishing_probability * 100).toFixed(1)}%\nRisk Level: ${pred.risk_level}\n\n${JSON.stringify(data, null, 2)}`, 
                        pred.is_phishing ? 'error' : 'success');
                } else {
                    showResult('predict-result', 
                        `⚠️ API Error:\n\n${JSON.stringify(data, null, 2)}`, 
                        'error');
                }
            } catch (error) {
                showResult('predict-result', 
                    `❌ ERROR: ${error.message}`, 
                    'error');
            }
        }

        async function testExtractAndAnalyze() {
            showResult('extract-result', '⏳ Testing...', 'info');
            
            const pageHtml = document.getElementById('page-html').value;
            
            try {
                const response = await fetch(`${API_BASE}/extract-and-analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        page_html: pageHtml,
                        model: 'random_forest'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    const analysis = data.analysis;
                    showResult('extract-result', 
                        `✅ SUCCESS!\n\nRisk Level: ${analysis.risk_level}\nPhishing Probability: ${(analysis.phishing_probability * 100).toFixed(1)}%\nRed Flags: ${analysis.red_flags.length}\nSocial Engineering: ${analysis.social_engineering.techniques_detected}\n\nExtracted Email:\n  Subject: ${data.extracted_email.subject}\n  Sender: ${data.extracted_email.sender}\n  Body: ${data.extracted_email.body_preview}\n\nFull Response:\n${JSON.stringify(data, null, 2)}`, 
                        analysis.risk_level === 'HIGH' ? 'error' : 'success');
                } else {
                    showResult('extract-result', 
                        `⚠️ API Error:\n\n${JSON.stringify(data, null, 2)}`, 
                        'error');
                }
            } catch (error) {
                showResult('extract-result', 
                    `❌ ERROR: ${error.message}\n\nMake sure backend is running:\n  cd backend\n  python app.py`, 
                    'error');
            }
        }

        // Auto-test health on load
        window.onload = function() {
            testHealth();
        };
    </script>
</body>
</html>
